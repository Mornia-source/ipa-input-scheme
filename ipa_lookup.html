<title>IPA 编码查询表</title>
<style>
  /* committed to a single bright light theme regardless of system/viewer
     dark-mode preference — the user asked for the page to stay light */
  :root, :root[data-theme="dark"], :root[data-theme="light"] {
    --bg: #f7f6f1;
    --surface: #ffffff;
    --ink: #1c1912;
    --ink-dim: #6b6656;
    --ink-faint: #99937f;
    --sym-ink: #0a0805;
    --accent: #4c7360;
    --accent-ink: #ffffff;
    --chip-bg: #e6efe8;
    --chip-ink: #2b4636;
    --border: #e3ded0;
    --shade: #edeade;
    --head-bg: #e7e2d1;
    --mono: ui-monospace, "Cascadia Mono", "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    --serif: "Times New Roman", Times, "Noto Serif", serif;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 0 24px;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 24px 18px 72px; zoom: 1.55; }

  header.top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  h1.title {
    font-family: var(--serif);
    font-size: 24px;
    font-weight: 700;
    margin: 0;
    letter-spacing: 0.02em;
  }
  h1.title .cn { font-family: var(--sans); font-size: 13px; font-weight: 600; color: var(--ink-faint); display: block; margin-top: 2px; letter-spacing: 0.08em; }

  .search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 9px 12px;
    min-width: 280px;
    flex: 1;
    max-width: 420px;
  }
  .search-box svg { flex: none; opacity: 0.55; }
  #q {
    flex: 1; border: none; outline: none; background: transparent;
    color: var(--ink); font-family: var(--mono); font-size: 15px;
  }
  #q::placeholder { color: var(--ink-faint); font-family: var(--sans); font-size: 13px; }
  #q:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
  #matchcount { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); white-space: nowrap; }

  h2.sec {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--ink-dim);
    margin: 26px 0 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  p.note { font-size: 11.5px; color: var(--ink-faint); margin: -2px 0 10px; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 0 28px; align-items: start; }
  @media (max-width: 860px) { .two-col { grid-template-columns: 1fr; } }

  .scrollx { overflow-x: auto; }

  table.chart {
    border-collapse: collapse;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    width: 100%;
  }
  table.chart th {
    font-family: var(--sans);
    font-size: 10.5px;
    font-weight: 700;
    color: var(--ink-dim);
    background: var(--head-bg);
    padding: 6px 3px;
    border-left: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  table.chart th:first-child { border-left: none; }
  table.chart td {
    border-left: 1px solid var(--border);
    border-top: 1px solid var(--border);
    padding: 4px 2px;
    text-align: center;
    vertical-align: middle;
    min-width: 44px;
  }
  table.chart td.rowhead {
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-dim);
    padding-left: 8px;
    white-space: nowrap;
    border-left: none;
  }
  table.chart td.shade { background: var(--shade); }
  .hdr-marker {
    display: block;
    font-family: var(--mono);
    font-weight: 400;
    font-size: 9.5px;
    color: var(--chip-ink);
    letter-spacing: 0.02em;
    margin-top: 1px;
  }
  table.chart td.rowhead .hdr-marker { display: inline; margin-left: 5px; }
  table.chart td.blank { background: none; }

  .cell {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    line-height: 1.15;
    padding: 2px 3px;
    border-radius: 4px;
    transition: opacity 120ms ease, background-color 120ms ease;
  }
  .cell .g-sym { font-family: var(--serif); font-size: 17px; color: var(--sym-ink); font-weight: 600; }
  .cell .g-code { font-family: var(--mono); font-size: 9px; color: var(--chip-ink); background: var(--chip-bg); border-radius: 3px; padding: 0 3px; margin-top: 1px; }
  .cell.hit { background: color-mix(in srgb, var(--accent) 18%, transparent); }
  .dim .cell { opacity: 0.18; }

  /* label-grid tables: other symbols / diacritics */
  table.labelgrid { table-layout: fixed; }
  table.labelgrid td { width: 33.34%; padding: 6px 8px; vertical-align: top; text-align: left; min-width: 0; }
  table.labelgrid .lbl { font-size: 11px; color: var(--ink-dim); line-height: 1.3; min-height: 2.6em; }
  table.labelgrid .cell { align-items: center; flex-direction: row; gap: 6px; margin-top: 3px; }
  table.labelgrid .g-sym { font-size: 18px; min-width: 20px; text-align: center; }

  ul.supra {
    list-style: none; margin: 0; padding: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
  }
  ul.supra li {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px; border-top: 1px solid var(--border);
  }
  ul.supra li:first-child { border-top: none; }
  ul.supra .g-sym { font-family: var(--serif); font-size: 19px; min-width: 26px; text-align: center; }
  ul.supra .lbl { font-size: 12px; color: var(--ink-dim); flex: 1; }
  ul.supra .g-code { font-family: var(--mono); font-size: 10px; color: var(--chip-ink); background: var(--chip-bg); border-radius: 3px; padding: 1px 5px; }
  ul.supra li.na .g-code { color: var(--ink-faint); background: transparent; font-style: italic; }
  ul.supra li.dim { opacity: 0.18; }
  ul.supra li.hit { background: color-mix(in srgb, var(--accent) 12%, transparent); }

  /* vowel chart */
  .vowel-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px; }
  svg.vowel { width: 100%; height: auto; display: block; }
  .v-sym { font-family: var(--serif); font-size: 15px; fill: var(--sym-ink); font-weight: 600; }
  .v-code { font-family: var(--mono); font-size: 8px; fill: var(--chip-ink); }
  .v-line { stroke: var(--border); stroke-width: 1.3; fill: none; }
  .v-axis { font-family: var(--sans); font-size: 10.5px; font-weight: 700; fill: var(--ink-dim); }
  .v-dot { fill: var(--accent); }
  .v-cell.dim { opacity: 0.16; }
  .v-cell.hit .v-sym { fill: var(--accent); font-weight: 700; }

  ::selection { background: color-mix(in srgb, var(--accent) 30%, transparent); }

  /* hover magnifier */
  #magnifier {
    position: fixed;
    left: 0; top: 0;
    z-index: 999;
    pointer-events: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 16px 32px rgba(0,0,0,0.16), 0 4px 10px rgba(0,0,0,0.10);
    padding: 16px 22px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    opacity: 0;
    transform-origin: 50% 100%;
    transform: scale(0.85);
    transition: opacity 110ms ease, transform 110ms ease;
    will-change: transform, opacity;
  }
  #magnifier.show { opacity: 1; transform: scale(1); }
  #magnifier.below { transform-origin: 50% 0%; }
  #magnifier .m-sym { font-family: var(--serif); font-size: 60px; line-height: 1; color: var(--ink); }
  #magnifier .m-code { font-family: var(--mono); font-size: 13px; color: var(--chip-ink); background: var(--chip-bg); padding: 3px 10px; border-radius: 6px; margin-top: 8px; }
  #magnifier .m-label { font-size: 11px; color: var(--ink-faint); margin-top: 5px; max-width: 180px; text-align: center; line-height: 1.4; }

  [data-sym] { cursor: default; }
</style>

<div class="wrap">
  <header class="top">
    <h1 class="title">IPA<span class="cn">国际音标 编码查询表</span></h1>
    <div class="search-box">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.4"/>
        <path d="M11 11L14.5 14.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <input id="q" type="text" placeholder="按符号或编码搜索，如 θ 或 sh" autocomplete="off" autofocus />
      <span id="matchcount"></span>
    </div>
  </header>

  <h2 class="sec">辅音（肺部气流）</h2>
  <p class="note">格内符号下方为对应输入编码；左侧为清音，右侧为浊音；灰色格为发不出的组合。</p>
  <div class="scrollx"><table class="chart" id="t-pulmonic"></table></div>

  <div class="two-col">
    <div>
      <h2 class="sec">辅音（非肺部气流）</h2>
      <div class="scrollx"><table class="chart" id="t-nonpulmonic"></table></div>

      <h2 class="sec">其他符号</h2>
      <div class="scrollx"><table class="chart labelgrid" id="t-other"></table></div>

      <h2 class="sec">附加符号</h2>
      <div class="scrollx"><table class="chart labelgrid" id="t-diacritics"></table></div>
    </div>

    <div>
      <h2 class="sec">元音</h2>
      <div class="vowel-card"><svg class="vowel" id="vowel-svg" viewBox="0 0 380 355" xmlns="http://www.w3.org/2000/svg"></svg></div>

      <h2 class="sec">超音段符号</h2>
      <ul class="supra" id="t-supra"></ul>

      <h2 class="sec">声调与词重音</h2>
      <div class="scrollx"><table class="chart" id="t-tones"></table></div>
    </div>
  </div>
</div>

<div id="magnifier">
  <span class="m-sym" id="m-sym"></span>
  <span class="m-code" id="m-code"></span>
  <span class="m-label" id="m-label"></span>
</div>

  const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  function searchKey(sym, codes) {
    // deliberately NOT including the (often English) descriptive label here:
    // e.g. "close-mid" contains "se", which used to make searching "se"
    // surface a pile of unrelated vowels. Search should only match what the
    // user actually types — the symbol itself or one of its codes.
    return (sym + ' ' + (codes||[]).join(' ')).toLowerCase();
  }

  function codeText(codes) {
    return codes && codes.length ? esc(codes[0]) : '—';
  }

  function dataAttrs(sym, codes, label) {
    const key = esc(searchKey(sym, codes));
    const code = codes && codes.length ? esc(codes.join(' / ')) : '';
    return `data-key="${key}" data-sym="${esc(sym)}" data-code="${code}" data-label="${esc(label || '')}"`;
  }

  function cellHtml(sym, codes, label) {
    return `<span class="cell" ${dataAttrs(sym, codes, label)}><span class="g-sym">${esc(sym)}</span><span class="g-code">${codeText(codes)}</span></span>`;
  }

  // ---------------- pulmonic consonants ----------------
  // marker letters pulled from IPAcode.txt's own "字母:XX标识" legend lines —
  // the ones actually used to build the place/manner columns and rows below
  const PLACE_MARKERS = {
    '双唇音': ['m', 'p', 'b'],
    '唇齿音': ['v'],
    '齿音': ['v'],
    '龈音': ['t', 'd'],
    '龈后音': [],
    '卷舌音': ['r'],
    '硬腭音': ['c'],
    '软腭音': ['k', 'g'],
    '小舌音': ['q'],
    '咽音': ['?'],
    '声门音': ['h'],
  };
  const MANNER_MARKERS = {
    '爆发音': ['p', 'b', 't', 'd'],
    '鼻音': ['m', 'n'],
    '颤音': ['r'],
    '拍音或闪音': ['V', 'v', 'R', 'r'],
    '擦音': ['s', 'z'],
    '边擦音': [],
    '近音': ['j'],
    '边近音': ['l'],
  };
  const markerHtml = letters => letters && letters.length
    ? `<span class="hdr-marker">${letters.map(esc).join('·')}</span>`
    : '';

  function buildPulmonic() {
    const table = document.getElementById('t-pulmonic');
    const byPos = {};
    D.pulmonic.forEach(s => { byPos[s.col + '_' + s.row] = s; });
    const impSet = new Set(D.imp.map(p => p[0] + '_' + p[1]));

    let thead = '<thead><tr><th></th>';
    D.places.forEach(p => { thead += `<th colspan="2">${p}${markerHtml(PLACE_MARKERS[p])}</th>`; });
    thead += '</tr></thead>';

    let body = '<tbody>';
    D.manners.forEach((manner, ri) => {
      const row = ri + 1;
      body += `<tr><td class="rowhead">${manner}${markerHtml(MANNER_MARKERS[manner])}</td>`;
      for (let col = 1; col <= 22; col++) {
        const s = byPos[col + '_' + row];
        const shaded = impSet.has(col + '_' + row);
        if (s) {
          body += `<td>${cellHtml(s.symbol, s.codes, s.descr)}</td>`;
        } else if (shaded) {
          body += `<td class="shade"></td>`;
        } else {
          body += `<td class="blank"></td>`;
        }
      }
      body += '</tr>';
    });
    body += '</tbody>';
    table.innerHTML = thead + body;
  }

  // ---------------- non-pulmonic ----------------
  const AIRSTREAM_MARKERS = {
    '吸着音': ['!'],
    '内爆音': [';'],
    '挤气音': ["'"],
  };

  function buildNonPulmonic() {
    const table = document.getElementById('t-nonpulmonic');
    const byPos = {};
    D.nonpulmonic.forEach(s => { byPos[s.col + '_' + s.row] = s; });
    let thead = '<thead><tr>';
    D.airstreams.forEach(a => { thead += `<th>${a}${markerHtml(AIRSTREAM_MARKERS[a])}</th>`; });
    thead += '</tr></thead>';
    let body = '<tbody>';
    for (let row = 1; row <= 5; row++) {
      body += '<tr>';
      for (let col = 1; col <= 3; col++) {
        const s = byPos[col + '_' + row];
        body += s ? `<td>${cellHtml(s.symbol, s.codes, s.label)}</td>` : '<td class="blank"></td>';
      }
      body += '</tr>';
    }
    body += '</tbody>';
    table.innerHTML = thead + body;
  }

  // ---------------- other symbols / diacritics (label grids) ----------------
  function buildLabelGrid(elId, items, cols, rows) {
    const table = document.getElementById(elId);
    const byPos = {};
    items.forEach(s => { byPos[s.col + '_' + s.row] = s; });
    let body = '<tbody>';
    for (let row = 1; row <= rows; row++) {
      body += '<tr>';
      for (let col = 1; col <= cols; col++) {
        const s = byPos[col + '_' + row];
        if (s) {
          body += `<td><div class="lbl">${esc(s.label)}</div><span class="cell" ${dataAttrs(s.symbol, s.codes, s.label)}><span class="g-sym">${esc(s.symbol)}</span><span class="g-code">${codeText(s.codes)}</span></span></td>`;
        } else {
          body += '<td class="blank"></td>';
        }
      }
      body += '</tr>';
    }
    body += '</tbody>';
    table.innerHTML = body;
  }

  // ---------------- suprasegmentals ----------------
  function buildSupra() {
    const ul = document.getElementById('t-supra');
    ul.innerHTML = D.suprasegmentals.map(s => {
      const na = !s.codes;
      return `<li class="cell ${na ? 'na' : ''}" ${dataAttrs(s.symbol, s.codes, s.label)}>
        <span class="g-sym">${esc(s.symbol)}</span>
        <span class="lbl">${esc(s.label)}</span>
        <span class="g-code">${na ? '本方案未编码' : codeText(s.codes)}</span>
      </li>`;
    }).join('');
  }

  // ---------------- tones ----------------
  function buildTones() {
    const table = document.getElementById('t-tones');
    const byPos = {};
    D.tones.forEach(s => { byPos[s.col + '_' + s.row] = s; });
    let thead = `<thead><tr><th colspan="2">平调</th><th colspan="2">非平调</th></tr></thead>`;
    let body = '<tbody>';
    for (let row = 1; row <= 7; row++) {
      body += '<tr>';
      for (let col = 1; col <= 4; col++) {
        const s = byPos[col + '_' + row];
        body += s ? `<td>${cellHtml(s.symbol, s.codes, s.label)}</td>` : '<td class="blank"></td>';
      }
      body += '</tr>';
    }
    body += '</tbody>';
    table.innerHTML = thead + body;
  }

  // ---------------- vowels (SVG trapezoid) ----------------
  function buildVowels() {
    const svg = document.getElementById('vowel-svg');
    const X = c => 46 + (c - 5) * 9.2;
    const Y = r => 58 + (r - 1) * 40;
    const parts = [];

    parts.push(`<text class="v-axis" x="${X(10)}" y="16" text-anchor="middle">前</text>`);
    parts.push(`<text class="v-axis" x="${X(23)}" y="16" text-anchor="middle">央</text>`);
    parts.push(`<text class="v-axis" x="${X(34)}" y="16" text-anchor="middle">后</text>`);

    const heightRows = {1:'狭', 3:'半狭', 5:'半广', 7:'广'};
    Object.entries(heightRows).forEach(([r, label]) => {
      parts.push(`<text class="v-axis" x="2" y="${Y(+r) + 4}" text-anchor="start">${label}</text>`);
    });

    // outer boundary must pass exactly through the real corner-vowel
    // positions (front i/e/ɛ/a, back u/o/ɔ/ɒ) — not a hand-drawn shape —
    // so the trapezoid line and the dots always line up
    const bySym = {};
    D.vowels.forEach(s => { bySym[s.symbol] = s; });
    const boundaryOrder = ['i', 'e', 'ɛ', 'a', 'ɒ', 'ɔ', 'o', 'u'];
    const boundaryPts = boundaryOrder
      .map(sym => bySym[sym])
      .filter(Boolean)
      .map(s => `${X(s.col)},${Y(s.row)}`)
      .join(' ');
    parts.push(`<polygon class="v-line" points="${boundaryPts}" />`);

    D.vowels.forEach(s => {
      const x = X(s.col), y = Y(s.row);
      parts.push(`<g class="v-cell" ${dataAttrs(s.symbol, s.codes, s.descr)}>
        <circle class="v-dot" cx="${x}" cy="${y}" r="1.8" />
        <text class="v-sym" x="${x}" y="${y - 7}" text-anchor="middle">${esc(s.symbol)}</text>
        <text class="v-code" x="${x}" y="${y + 13}" text-anchor="middle">${codeText(s.codes)}</text>
      </g>`);
    });

    svg.innerHTML = parts.join('');
  }

  buildPulmonic();
  buildNonPulmonic();
  buildLabelGrid('t-other', D.other, 3, 6);
  buildLabelGrid('t-diacritics', D.diacritics, 3, 12);
  buildSupra();
  buildTones();
  buildVowels();

  // ---------------- search ----------------
  const qEl = document.getElementById('q');
  const countEl = document.getElementById('matchcount');

  function applySearch() {
    const q = qEl.value.trim().toLowerCase();
    const cells = document.querySelectorAll('.cell, .v-cell');
    if (!q) {
      cells.forEach(c => { c.classList.remove('hit'); c.closest('td, li')?.classList.remove('dim'); c.classList.remove('dim'); });
      countEl.textContent = '';
      return;
    }
    let hits = 0;
    let firstHit = null;
    cells.forEach(c => {
      const key = c.dataset.key || '';
      const match = key.includes(q);
      c.classList.toggle('hit', match);
      const host = c.tagName === 'LI' ? c : (c.closest('td') || c);
      host.classList.toggle('dim', !match);
      if (match) { hits++; if (!firstHit) firstHit = c; }
    });
    countEl.textContent = hits + ' 处匹配';
    if (firstHit) firstHit.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  qEl.addEventListener('input', applySearch);

  // ---------------- hover magnifier ----------------
  const magnifier = document.getElementById('magnifier');
  const mSym = document.getElementById('m-sym');
  const mCode = document.getElementById('m-code');
  const mLabel = document.getElementById('m-label');
  let currentEl = null;

  function positionMagnifier(el) {
    // #magnifier is a fixed-position element OUTSIDE .wrap (a sibling, not
    // a descendant of the zoomed container), so it is never subject to
    // .wrap's zoom at all — its left/top are plain viewport pixels, exactly
    // like getBoundingClientRect() on the hovered element. No conversion.
    const rect = el.getBoundingClientRect();
    const magRect = magnifier.getBoundingClientRect();
    const w = magRect.width || 260;
    const h = magRect.height || 180;
    const gap = 10;
    const cx = rect.left + rect.width / 2;
    const left = Math.min(Math.max(cx - w / 2, 8), window.innerWidth - w - 8);
    const below = rect.top < h + gap + 20;
    const top = below ? rect.bottom + gap : rect.top - h - gap;
    magnifier.classList.toggle('below', below);
    magnifier.style.left = left + 'px';
    magnifier.style.top = top + 'px';
  }

  function showMagnifier(el) {
    const sym = el.dataset.sym;
    if (!sym) return;
    mSym.textContent = sym;
    mCode.textContent = el.dataset.code || '本方案未编码';
    mLabel.textContent = el.dataset.label || '';
    mLabel.style.display = el.dataset.label ? '' : 'none';
    positionMagnifier(el);
    magnifier.classList.add('show');
  }

  function hideMagnifier() {
    magnifier.classList.remove('show');
    currentEl = null;
  }

  document.addEventListener('pointerover', e => {
    const el = e.target.closest('[data-sym]');
    if (!el || el === currentEl) return;
    currentEl = el;
    showMagnifier(el);
  });

  document.addEventListener('pointerout', e => {
    const el = e.target.closest('[data-sym]');
    if (!el || el !== currentEl) return;
    if (e.relatedTarget && el.contains(e.relatedTarget)) return;
    hideMagnifier();
  });

  window.addEventListener('scroll', hideMagnifier, { passive: true, capture: true });
</script>
