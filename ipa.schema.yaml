---
schema:
  schema_id: ipa
  name: 樱桃IPA输入法
  version: "0.1"
  author:
    - 用户自定义方案
  description: |
    基于"主动发声部位+被动发声部位"字母组合的IPA国际音标输入方案。
    候选框选词才会打出IPA符号，直接回车只上屏原始拉丁字母。

switches:
  - name: ascii_mode
    reset: 0
    states: [ 樱桃IPA, 西文 ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - fallback_segmentor
  translators:
    - table_translator

speller:
  alphabet: "!\"&'()+-./012345:;=?AEGHLNORVY[\\]^`abcdefghijklmnopqrstuvwxyz|~"
  delimiter: " "
  algebra: []

translator:
  dictionary: ipa
  enable_completion: true
  enable_sentence: false
  max_phrase_length: 1
  # 去掉"还差几个键能选出这一项"提示前固定的 ~ 前缀，只保留剩余按键本身
  comment_format:
    - "xform/^~//"

# 不启用标点转换：本方案里 ~ ? ! ( ) [ ] = + 等符号本身就是有意义的编码字符，
# 一旦交给 punctuator 会被抢先转换成中文标点，导致这些编码打不出来。
punctuator:
  half_shape: {}
  full_shape: {}

# 候选框里的字体：Times New Roman 优先，但它本身不是专业音标字体，很多组合附加符号
# （比如齿音、卷舌性那些叠加在字母上的小符号）它并不收录，缺字形时 Windows 会挑一个
# 有该字形的字体来救场，很容易救到某个东亚字体上，于是那个符号单占一个"全角"宽度，
# 看起来又大又不对齐。这里把 SIL 出的两款专业音标字体（覆盖全部IPA含组合符号）设成
# 后备字体，缺字才会落到它们身上，而不是落到某个不相关的宽字体。
style:
  font_face: "Times New Roman,Doulos SIL,Charis SIL,Segoe UI Symbol"
